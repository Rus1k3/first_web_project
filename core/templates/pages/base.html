<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}OneMail{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(120deg, #0d6efd, #6610f2, #20c997);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
            color: white;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
        }

        footer {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">OneMail</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Главная</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'about' %}">О сервисе</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
</header>

<main class="flex-grow-1 text-center">

{% block content %}
{% endblock %}

</main>

<footer class="text-center py-4 mt-auto">
    <div class="container">
        <p class="mb-1">© 2026 OneMail</p>
        <div>
            <a href="#" class="text-white me-2">GitHub</a>
            <a href="#" class="text-white me-2">Telegram</a>
            <a href="#" class="text-white">Docs</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
