{% extends 'core/base.html' %}

{% block title %}
Контакты
{% endblock %}

{% block content %}

<section class="py-5">
    <div class="container glass text-start">

        <h1 class="mb-4">Связаться с нами</h1>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                {{ form.subject }}
            </div>

            <div class="mb-3">
                {{ form.email }}
            </div>

            <div class="mb-3">
                {{ form.text }}
            </div>

            <button type="submit" class="btn btn-warning btn-lg">
                Отправить
            </button>
        </form>

    </div>
</section>

{% endblock %}
